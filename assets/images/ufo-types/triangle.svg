<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <defs>
    <radialGradient id="triBody" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0a0a1a"/>
    </radialGradient>
    <linearGradient id="cornerLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5fe7e7" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#b96eff" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#c1272d" stop-opacity="0.5"/>
    </linearGradient>
    <linearGradient id="centerGlow" x1="50%" y1="0%" x2="50%" y2="100%">
      <stop offset="0%" stop-color="#b96eff" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0a0a1a" stop-opacity="0.9"/>
    </linearGradient>
  </defs>
  <!-- 三角形主體 -->
  <polygon points="100,15 185,115 15,115" fill="url(#triBody)" stroke="#b96eff" stroke-width="2" opacity="0.95"/>
  <!-- 三個角落發光 -->
  <circle cx="100" cy="20" r="12" fill="url(#cornerLight)"/>
  <circle cx="190" cy="120" r="12" fill="url(#cornerLight)"/>
  <circle cx="10" cy="120" r="12" fill="url(#cornerLight)"/>
  <!-- 中央發光核心 -->
  <ellipse cx="100" cy="85" rx="35" ry="25" fill="url(#centerGlow)" opacity="0.6"/>
  <!-- 邊緣條紋 -->
  <path d="M60,80 L140,80" stroke="#5fe7e7" stroke-width="1" opacity="0.4" stroke-dasharray="6,4"/>
  <path d="M70,95 L130,95" stroke="#5fe7e7" stroke-width="0.5" opacity="0.3" stroke-dasharray="6,4"/>
</svg>
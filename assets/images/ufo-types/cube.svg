<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <radialGradient id="cubeBody" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#b8c8e8" stop-opacity="0.9"/>
      <stop offset="50%" stop-color="#7888c8" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#4858a8" stop-opacity="0.7"/>
    </radialGradient>
    <radialGradient id="cubeGlow" cx="30%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#5fe7e7" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#b96eff" stop-opacity="0.3"/>
    </radialGradient>
    <radialGradient id="cubeCore" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#b96eff" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#4a0080" stop-opacity="0.9"/>
    </radialGradient>
  </defs>
  <!-- 等軸測立方體 -->
  <!-- 頂面 -->
  <path d="M100,30 L150,55 L150,105 L100,80 Z" fill="url(#cubeBody)" stroke="#b96eff" stroke-width="2" opacity="0.95"/>
  <!-- 右側面 -->
  <path d="M150,55 L150,105 L100,130 L100,80 Z" fill="url(#cubeGlow)" stroke="#b96eff" stroke-width="2" opacity="0.9"/>
  <!-- 左側面 -->
  <path d="M100,30 L50,55 L50,105 L100,80 Z" fill="url(#cubeBody)" stroke="#b96eff" stroke-width="2" opacity="0.8"/>
  <!-- 發光核心 -->
  <ellipse cx="100" cy="80" rx="25" ry="15" fill="url(#cubeCore)" opacity="0.7"/>
  <!-- 邊緣發光線 -->
  <path d="M100,30 L100,80" stroke="#5fe7e7" stroke-width="2" opacity="0.6" stroke-dasharray="8,4"/>
  <path d="M150,55 L150,105" stroke="#b96eff" stroke-width="1.5" opacity="0.5" stroke-dasharray="8,4"/>
  <path d="M50,55 L50,105" stroke="#5fe7e7" stroke-width="1.5" opacity="0.4" stroke-dasharray="8,4"/>
  <!-- 表面幾何紋理 -->
  <path d="M75,65 L125,65" stroke="#5fe7e7" stroke-width="0.8" fill="none" opacity="0.3" stroke-dasharray="6,3"/>
  <path d="M75,95 L125,95" stroke="#b96eff" stroke-width="0.5" fill="none" opacity="0.2" stroke-dasharray="6,3"/>
</svg>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 140">
  <defs>
    <radialGradient id="ticBody" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e8e8f0"/>
      <stop offset="100%" stop-color="#c8d0e8"/>
    </radialGradient>
    <radialGradient id="ticGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#b96eff" stop-opacity="0.3"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="4"/>
    </filter>
  </defs>
  <!-- 橢圓主體 (Tic Tac 形狀) -->
  <ellipse cx="100" cy="70" rx="75" ry="35" fill="url(#ticBody)" stroke="#b96eff" stroke-width="1.5" opacity="0.95"/>
  <!-- 發光效果 -->
  <ellipse cx="100" cy="70" rx="70" ry="32" fill="url(#ticGlow)" opacity="0.5"/>
  <!-- 兩端圓角 -->
  <ellipse cx="30" cy="70" rx="5" ry="35" fill="url(#ticBody)" stroke="#b96eff" stroke-width="1" opacity="0.9"/>
  <ellipse cx="170" cy="70" rx="5" ry="35" fill="url(#ticBody)" stroke="#b96eff" stroke-width="1" opacity="0.9"/>
  <!-- 表面細節線 -->
  <path d="M50,50 Q100,45 150,50" stroke="#b96eff" stroke-width="0.5" fill="none" opacity="0.4" stroke-dasharray="8,4"/>
  <path d="M50,90 Q100,95 150,90" stroke="#b96eff" stroke-width="0.5" fill="none" opacity="0.4" stroke-dasharray="8,4"/>
  <!-- 前端發光 -->
  <ellipse cx="175" cy="70" rx="8" ry="20" fill="#b96eff" opacity="0.4" filter="url(#blur)"/>
</svg>